<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 380" width="1400" height="380">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .noise-dot {
        fill: #0f1923;
        animation: flicker 3.5s ease-in-out infinite;
      }
      @keyframes flicker {
        0%, 100% { opacity: var(--base-op, 0.3); }
        50% { opacity: calc(var(--base-op, 0.3) * 0.25); }
      }
      .signal-base {
        fill: none;
        stroke: #2b6cb0;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.3;
      }
      .tha-letter {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 108px;
        fill: #0f1923;
        opacity: 0;
        animation: emerge 4.5s ease-in-out infinite;
      }
      .tha-t { animation-delay: 0s; }
      .tha-h { animation-delay: 0.15s; }
      .tha-a { animation-delay: 0.3s; }
      @keyframes emerge {
        0% { opacity: 0; }
        8% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 1; }
      }
      .tagline {
        font-family: 'Courier New', Courier, monospace;
        font-size: 20px;
        letter-spacing: 0.35em;
        fill: #718096;
        text-transform: uppercase;
      }
    </style>

    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#6fa8dc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2b6cb0" stop-opacity="0"/>
    </radialGradient>

    <filter id="sparkGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="380"/>

  <!-- Noise field: dense left, thinning toward the signal -->
  <g class="noise">
    <circle class="noise-dot" cx="35" cy="60" r="2.2" style="--base-op:0.45; animation-delay:0.1s"/>
    <circle class="noise-dot" cx="70" cy="140" r="1.6" style="--base-op:0.3; animation-delay:1.2s"/>
    <circle class="noise-dot" cx="50" cy="220" r="2.8" style="--base-op:0.5; animation-delay:0.6s"/>
    <circle class="noise-dot" cx="100" cy="290" r="1.4" style="--base-op:0.25; animation-delay:2.1s"/>
    <circle class="noise-dot" cx="130" cy="45" r="2.0" style="--base-op:0.4; animation-delay:1.7s"/>
    <circle class="noise-dot" cx="160" cy="180" r="1.8" style="--base-op:0.35; animation-delay:0.3s"/>
    <circle class="noise-dot" cx="190" cy="100" r="2.4" style="--base-op:0.45; animation-delay:2.6s"/>
    <circle class="noise-dot" cx="210" cy="260" r="1.5" style="--base-op:0.3; animation-delay:1.0s"/>
    <circle class="noise-dot" cx="240" cy="310" r="2.1" style="--base-op:0.4; animation-delay:0.8s"/>
    <circle class="noise-dot" cx="80" cy="330" r="1.7" style="--base-op:0.3; animation-delay:1.9s"/>
    <circle class="noise-dot" cx="270" cy="70" r="1.9" style="--base-op:0.35; animation-delay:2.3s"/>
    <circle class="noise-dot" cx="300" cy="150" r="2.3" style="--base-op:0.4; animation-delay:0.4s"/>
    <circle class="noise-dot" cx="20" cy="180" r="1.6" style="--base-op:0.3; animation-delay:1.4s"/>
    <circle class="noise-dot" cx="330" cy="230" r="1.4" style="--base-op:0.25; animation-delay:2.8s"/>
    <circle class="noise-dot" cx="360" cy="90" r="2.0" style="--base-op:0.35; animation-delay:0.9s"/>
    <circle class="noise-dot" cx="140" cy="290" r="1.8" style="--base-op:0.3; animation-delay:1.6s"/>
    <circle class="noise-dot" cx="390" cy="180" r="1.5" style="--base-op:0.28; animation-delay:2.0s"/>
    <circle class="noise-dot" cx="60" cy="20" r="1.7" style="--base-op:0.3; animation-delay:0.5s"/>
    <circle class="noise-dot" cx="420" cy="260" r="1.3" style="--base-op:0.22; animation-delay:3.1s"/>
    <circle class="noise-dot" cx="180" cy="320" r="1.6" style="--base-op:0.28; animation-delay:1.3s"/>
    <circle class="noise-dot" cx="450" cy="110" r="1.4" style="--base-op:0.22; animation-delay:2.5s"/>
    <circle class="noise-dot" cx="480" cy="200" r="1.2" style="--base-op:0.2; animation-delay:0.7s"/>
    <circle class="noise-dot" cx="10" cy="260" r="2.0" style="--base-op:0.35; animation-delay:1.8s"/>
    <circle class="noise-dot" cx="510" cy="70" r="1.1" style="--base-op:0.18; animation-delay:3.3s"/>
    <circle class="noise-dot" cx="250" cy="30" r="1.5" style="--base-op:0.25; animation-delay:0.2s"/>
    <circle class="noise-dot" cx="540" cy="240" r="1.0" style="--base-op:0.16; animation-delay:2.9s"/>
    <circle class="noise-dot" cx="110" cy="230" r="1.9" style="--base-op:0.32; animation-delay:1.1s"/>
    <circle class="noise-dot" cx="570" cy="150" r="0.9" style="--base-op:0.15; animation-delay:3.6s"/>
    <circle class="noise-dot" cx="310" cy="290" r="1.3" style="--base-op:0.22; animation-delay:2.2s"/>
    <circle class="noise-dot" cx="600" cy="90" r="0.8" style="--base-op:0.13; animation-delay:0.4s"/>
    <circle class="noise-dot" cx="40" cy="110" r="1.5" style="--base-op:0.26; animation-delay:1.5s"/>
    <circle class="noise-dot" cx="630" cy="220" r="0.7" style="--base-op:0.12; animation-delay:3.0s"/>
    <circle class="noise-dot" cx="200" cy="200" r="1.2" style="--base-op:0.2; animation-delay:0.6s"/>
    <circle class="noise-dot" cx="660" cy="160" r="0.6" style="--base-op:0.1; animation-delay:2.4s"/>
    <circle class="noise-dot" cx="380" cy="30" r="1.0" style="--base-op:0.16; animation-delay:1.0s"/>
    <circle class="noise-dot" cx="690" cy="270" r="0.6" style="--base-op:0.1; animation-delay:3.4s"/>
  </g>

  <!-- Signal path: erratic left, resolving flat and clean toward THA -->
  <path id="signalPath" class="signal-base" d="M30,175 C90,95 150,255 210,175 C280,105 340,245 400,175 C470,125 530,225 600,180 C680,150 760,205 840,185 C920,170 1000,195 1080,180 C1150,172 1250,178 1370,175"/>

  <!-- Comet trail: three glowing sparks chasing each other along the exact signal path -->
  <circle r="3" fill="url(#sparkCore)" filter="url(#sparkGlow)" opacity="0.35">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.28s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>
  <circle r="5" fill="url(#sparkCore)" filter="url(#sparkGlow)" opacity="0.6">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.14s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>
  <circle r="8" fill="url(#sparkCore)" filter="url(#sparkGlow)">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>

  <!-- THA, well-spaced monospace, sitting where the noise has cleared -->
  <text class="tha-letter tha-t" x="800" y="220" text-anchor="middle">T</text>
  <text class="tha-letter tha-h" x="965" y="220" text-anchor="middle">H</text>
  <text class="tha-letter tha-a" x="1130" y="220" text-anchor="middle">A</text>

  <text class="tagline" x="965" y="280" text-anchor="middle">THE HUMAN ALGORITHM</text>
</svg>
