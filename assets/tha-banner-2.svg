<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1400 380" width="1400" height="380">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .noise-dot {
        fill: #0f1923;
        animation: flicker 3.2s ease-in-out infinite;
      }
      @keyframes flicker {
        0%, 100% { opacity: var(--base-op, 0.4); }
        50% { opacity: calc(var(--base-op, 0.4) * 0.2); }
      }
      .signal-base {
        fill: none;
        stroke: #2b6cb0;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.3;
      }
      .link {
        stroke: #2b6cb0;
        stroke-width: 1.2;
        opacity: 0.28;
        fill: none;
      }
      .link-pulse {
        stroke: #6fa8dc;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 14 220;
        animation: linkTravel 3s linear infinite;
      }
      @keyframes linkTravel {
        0% { stroke-dashoffset: 234; }
        100% { stroke-dashoffset: 0; }
      }
      .node {
        fill: #2b6cb0;
        animation: nodePulse 2.6s ease-in-out infinite;
      }
      @keyframes nodePulse {
        0%, 100% { opacity: 0.55; r: 3.5px; }
        50% { opacity: 1; r: 4.5px; }
      }
      .tha-letter {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 140px;
        fill: #0f1923;
        opacity: 0;
        animation: emerge 4.5s ease-in-out infinite;
      }
      .tha-t { animation-delay: 0s; }
      .tha-h { animation-delay: 0.15s; }
      .tha-a { animation-delay: 0.3s; }
      @keyframes emerge {
        0% { opacity: 0; }
        8% { opacity: 1; }
        90% { opacity: 1; }
        100% { opacity: 1; }
      }
      .tagline {
        font-family: 'Courier New', Courier, monospace;
        font-size: 28px;
        letter-spacing: 0.35em;
        fill: #718096;
        text-transform: uppercase;
      }
    </style>

    <radialGradient id="sparkCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#6fa8dc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2b6cb0" stop-opacity="0"/>
    </radialGradient>

    <filter id="sparkGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="380"/>

  <!-- Noise field: loud and dense on the far left, thinning as it approaches order -->
  <g class="noise">
    <circle class="noise-dot" cx="20" cy="50" r="3.2" style="--base-op:0.65; animation-delay:0.1s"/>
    <circle class="noise-dot" cx="45" cy="110" r="2.4" style="--base-op:0.55; animation-delay:0.9s"/>
    <circle class="noise-dot" cx="15" cy="170" r="3.6" style="--base-op:0.7; animation-delay:0.4s"/>
    <circle class="noise-dot" cx="65" cy="220" r="2.0" style="--base-op:0.5; animation-delay:1.6s"/>
    <circle class="noise-dot" cx="30" cy="260" r="3.0" style="--base-op:0.6; animation-delay:0.7s"/>
    <circle class="noise-dot" cx="90" cy="60" r="2.6" style="--base-op:0.55; animation-delay:1.2s"/>
    <circle class="noise-dot" cx="10" cy="300" r="2.2" style="--base-op:0.5; animation-delay:2.0s"/>
    <circle class="noise-dot" cx="110" cy="150" r="3.4" style="--base-op:0.65; animation-delay:0.3s"/>
    <circle class="noise-dot" cx="55" cy="330" r="2.8" style="--base-op:0.55; animation-delay:1.8s"/>
    <circle class="noise-dot" cx="130" cy="90" r="2.0" style="--base-op:0.45; animation-delay:0.6s"/>
    <circle class="noise-dot" cx="150" cy="200" r="2.6" style="--base-op:0.5; animation-delay:1.4s"/>
    <circle class="noise-dot" cx="80" cy="30" r="2.4" style="--base-op:0.5; animation-delay:2.3s"/>
    <circle class="noise-dot" cx="170" cy="270" r="2.2" style="--base-op:0.45; animation-delay:0.5s"/>
    <circle class="noise-dot" cx="120" cy="320" r="1.9" style="--base-op:0.4; animation-delay:1.1s"/>
    <circle class="noise-dot" cx="190" cy="60" r="2.8" style="--base-op:0.5; animation-delay:2.6s"/>
    <circle class="noise-dot" cx="200" cy="180" r="2.0" style="--base-op:0.42; animation-delay:0.8s"/>
    <circle class="noise-dot" cx="160" cy="120" r="1.8" style="--base-op:0.38; animation-delay:1.9s"/>
    <circle class="noise-dot" cx="230" cy="250" r="2.2" style="--base-op:0.42; animation-delay:0.2s"/>
    <circle class="noise-dot" cx="210" cy="310" r="1.6" style="--base-op:0.35; animation-delay:1.5s"/>
    <circle class="noise-dot" cx="250" cy="90" r="1.9" style="--base-op:0.38; animation-delay:2.1s"/>
    <circle class="noise-dot" cx="270" cy="160" r="2.0" style="--base-op:0.4; animation-delay:0.9s"/>
    <circle class="noise-dot" cx="240" cy="40" r="1.5" style="--base-op:0.32; animation-delay:1.3s"/>
    <circle class="noise-dot" cx="290" cy="220" r="1.7" style="--base-op:0.35; animation-delay:2.4s"/>
    <circle class="noise-dot" cx="310" cy="130" r="1.4" style="--base-op:0.3; animation-delay:0.4s"/>
    <circle class="noise-dot" cx="280" cy="290" r="1.6" style="--base-op:0.32; animation-delay:1.7s"/>
    <circle class="noise-dot" cx="330" cy="70" r="1.3" style="--base-op:0.28; animation-delay:2.8s"/>
    <circle class="noise-dot" cx="350" cy="190" r="1.5" style="--base-op:0.3; animation-delay:0.6s"/>
    <circle class="noise-dot" cx="320" cy="250" r="1.2" style="--base-op:0.26; animation-delay:1.0s"/>
    <circle class="noise-dot" cx="370" cy="110" r="1.3" style="--base-op:0.26; animation-delay:2.2s"/>
    <circle class="noise-dot" cx="390" cy="230" r="1.1" style="--base-op:0.22; animation-delay:0.3s"/>
    <circle class="noise-dot" cx="410" cy="60" r="1.2" style="--base-op:0.22; animation-delay:1.6s"/>
    <circle class="noise-dot" cx="430" cy="170" r="1.0" style="--base-op:0.2; animation-delay:2.5s"/>
    <circle class="noise-dot" cx="450" cy="290" r="0.9" style="--base-op:0.18; animation-delay:0.7s"/>
    <circle class="noise-dot" cx="470" cy="100" r="1.0" style="--base-op:0.18; animation-delay:1.9s"/>
    <circle class="noise-dot" cx="490" cy="200" r="0.8" style="--base-op:0.15; animation-delay:0.2s"/>
    <circle class="noise-dot" cx="510" cy="140" r="0.8" style="--base-op:0.14; animation-delay:1.2s"/>
    <circle class="noise-dot" cx="540" cy="230" r="0.7" style="--base-op:0.12; animation-delay:2.7s"/>
    <circle class="noise-dot" cx="570" cy="80" r="0.6" style="--base-op:0.1; animation-delay:0.5s"/>
    <circle class="noise-dot" cx="600" cy="180" r="0.6" style="--base-op:0.1; animation-delay:1.4s"/>
    <circle class="noise-dot" cx="640" cy="120" r="0.5" style="--base-op:0.08; animation-delay:2.0s"/>
  </g>

  <!-- Signal path: erratic and loud where the noise is, resolving flat as it enters order -->
  <path id="signalPath" class="signal-base" d="M20,175 C80,80 140,270 210,175 C270,100 330,250 400,175 C460,120 520,230 590,175 C650,145 720,205 790,180 C860,168 940,192 1020,180 C1100,172 1200,178 1300,175 C1330,174 1360,175 1380,175"/>

  <!-- Order: connected node network, framing THA -->
  <g class="network">
    <path class="link" d="M760,55 L850,42 L940,58 L1030,44 L1120,60 L1210,46 L1300,58 L1360,50"/>
    <path class="link" d="M760,330 L850,345 L940,325 L1030,340 L1120,320 L1210,338 L1300,322 L1360,332"/>
    <path class="link" d="M850,42 L850,345" opacity="0.15"/>
    <path class="link" d="M1030,44 L1030,340" opacity="0.15"/>
    <path class="link" d="M1210,46 L1210,338" opacity="0.15"/>
    <path class="link-pulse" d="M760,55 L850,42 L940,58 L1030,44 L1120,60 L1210,46 L1300,58 L1360,50"/>
    <path class="link-pulse" d="M760,330 L850,345 L940,325 L1030,340 L1120,320 L1210,338 L1300,322 L1360,332" style="animation-delay:-1.5s"/>

    <circle class="node" cx="760" cy="55" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0s"/>
    <circle class="node" cx="850" cy="42" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.1s"/>
    <circle class="node" cx="940" cy="58" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.2s"/>
    <circle class="node" cx="1030" cy="44" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.3s"/>
    <circle class="node" cx="1120" cy="60" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.4s"/>
    <circle class="node" cx="1210" cy="46" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.5s"/>
    <circle class="node" cx="1300" cy="58" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.6s"/>
    <circle class="node" cx="1360" cy="50" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.7s"/>

    <circle class="node" cx="760" cy="330" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.15s"/>
    <circle class="node" cx="850" cy="345" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.25s"/>
    <circle class="node" cx="940" cy="325" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.35s"/>
    <circle class="node" cx="1030" cy="340" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.45s"/>
    <circle class="node" cx="1120" cy="320" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.55s"/>
    <circle class="node" cx="1210" cy="338" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.65s"/>
    <circle class="node" cx="1300" cy="322" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.75s"/>
    <circle class="node" cx="1360" cy="332" r="3.5" filter="url(#nodeGlow)" style="animation-delay:0.85s"/>
  </g>

  <!-- Comet trail: three glowing sparks chasing each other along the exact signal path -->
  <circle r="3" fill="url(#sparkCore)" filter="url(#sparkGlow)" opacity="0.35">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.28s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>
  <circle r="5" fill="url(#sparkCore)" filter="url(#sparkGlow)" opacity="0.6">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.14s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>
  <circle r="8" fill="url(#sparkCore)" filter="url(#sparkGlow)">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="0s">
      <mpath xlink:href="#signalPath" href="#signalPath"/>
    </animateMotion>
  </circle>

  <!-- THA, well-spaced monospace, resting inside the ordered network -->
  <text class="tha-letter tha-t" x="770" y="225" text-anchor="middle">T</text>
  <text class="tha-letter tha-h" x="965" y="225" text-anchor="middle">H</text>
  <text class="tha-letter tha-a" x="1160" y="225" text-anchor="middle">A</text>

  <text class="tagline" x="965" y="290" text-anchor="middle">THE HUMAN ALGORITHM</text>
</svg>
