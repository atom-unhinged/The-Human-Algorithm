<svg width="620" height="440" viewBox="0 0 620 440" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes glitch {
        0%, 100% { opacity: 0.3; transform: scale(0.85); }
        50% { opacity: 0.9; transform: scale(1.1); }
      }
      @keyframes solid { 
        0%, 100% { opacity: 1; } 
      }
      .glitch { animation: glitch 2.8s infinite; }
      .solid { animation: solid 4s infinite; }
    </style>
  </defs>

  <!-- Main circle container -->
  <circle cx="310" cy="210" r="135" fill="none" stroke="#1e2937" stroke-width="38"/>

  <!-- Nodes inside circle -->
  <!-- Glitching / corrupted nodes -->
  <circle cx="240" cy="160" r="14" fill="#f87171" class="glitch"/>
  <circle cx="380" cy="170" r="14" fill="#f87171" class="glitch" style="animation-delay: 1.2s"/>
  <circle cx="260" cy="280" r="14" fill="#f87171" class="glitch" style="animation-delay: 2.1s"/>

  <!-- Solid / optimizing nodes -->
  <circle cx="240" cy="160" r="14" fill="#67e8f9" class="solid"/>
  <circle cx="380" cy="250" r="14" fill="#67e8f9" class="solid" style="animation-delay: 0.8s"/>
  <circle cx="340" cy="130" r="14" fill="#67e8f9" class="solid" style="animation-delay: 1.6s"/>
  <circle cx="270" cy="240" r="14" fill="#67e8f9" class="solid" style="animation-delay: 2.4s"/>
  <circle cx="390" cy="200" r="14" fill="#67e8f9" class="solid" style="animation-delay: 3.0s"/>

  <!-- Connecting interaction lines -->
  <line x1="240" y1="160" x2="340" y2="130" stroke="#67e8f9" stroke-width="4" stroke-opacity="0.7"/>
  <line x1="340" y1="130" x2="380" y2="250" stroke="#67e8f9" stroke-width="4" stroke-opacity="0.6"/>
  <line x1="270" y1="240" x2="390" y2="200" stroke="#67e8f9" stroke-width="4" stroke-opacity="0.7"/>

  <text x="310" y="390" text-anchor="middle" fill="#e0f2fe" font-family="system-ui, sans-serif" font-size="26" font-weight="600">
    THE HUMAN ALGORITHM
  </text>
</svg>
